<!DOCTYPE html>
<html class="dark" lang="en" id="html-tag" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Consultation | Bloom Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Noto+Serif:ital,wght@0,500;0,600;0,700;1,500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Light Mode */
        html.light body {
            background-color: #f4f7f5;
            color: #1a1c1c;
        }

        html.light .glass-panel {
            background: rgba(255, 255, 255, 0.80);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(46, 204, 113, 0.15);
        }

        html.light nav {
            background: rgba(255, 255, 255, 0.88) !important;
            border-bottom-color: rgba(0, 0, 0, 0.07) !important;
        }

        html.light footer.bg-gray-950 {
            background-color: #f0f4f2 !important;
            border-color: rgba(0, 0, 0, 0.08);
        }

        html.light input, 
        html.light select, 
        html.light textarea {
            background-color: #ffffff;
            border-color: #cbd5e0;
            color: #1a1c1c;
        }

        html.light input:focus, 
        html.light select:focus, 
        html.light textarea:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.2);
        }

        html.light label {
            color: #4a5568;
        }

        /* Dark Mode */
        html.dark body {
            background-color: #111415;
            color: #e1e3e4;
        }

        html.dark .glass-panel {
            background: rgba(17, 20, 21, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 148, 134, 0.12);
        }

        html.dark nav {
            background: rgba(17, 20, 21, 0.75) !important;
            border-bottom-color: rgba(255, 255, 255, 0.07) !important;
        }

        html.dark footer.bg-gray-950 {
            background-color: #0c0f10 !important;
        }

        html.dark input, 
        html.dark select, 
        html.dark textarea {
            background-color: #1a1e24;
            border-color: #2d3748;
            color: #e1e3e4;
        }

        html.dark input:focus, 
        html.dark select:focus, 
        html.dark textarea:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.3);
        }

        html.dark label {
            color: #a0aec0;
        }

        /* Common styles */
        .glass-panel {
            transition: transform 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
        }

        [dir="rtl"] .flex-row {
            flex-direction: row-reverse;
        }
    </style>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { "body-md": ["Manrope"], "headline-md": ["Noto Serif"] } } } };
    </script>
</head>

<body class="font-body-md bg-background text-on-background">

    <!-- Top Navigation Bar -->
    <nav
        class="fixed top-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-[1200px] rounded-lg border border-white/10 bg-gray-950/60 backdrop-blur-md flex justify-between items-center px-8 py-4 z-50 shadow-[0_0_40px_rgba(46,204,113,0.1)]">
        <div class="text-2xl font-serif italic text-emerald-400" id="brandName">Bloom Store</div>
        <div class="hidden md:flex gap-8 items-center">
            <a href="/"
                class="font-serif text-sm tracking-wide uppercase font-medium text-white/70 hover:text-white transition-colors"
                id="navHome">Home</a>
            <a href="/shop"
                class="font-serif text-sm tracking-wide uppercase font-medium text-white/70 hover:text-white transition-colors"
                id="navShop">Shop</a>
            <a href="/categories"
                class="font-serif text-sm tracking-wide uppercase font-medium text-white/70 hover:text-white transition-colors"
                id="navCategories">Categories</a>
            <a href="/occasions"
                class="font-serif text-sm tracking-wide uppercase font-medium text-white/70 hover:text-white transition-colors"
                id="navOccasions">Occasions</a>
            <a href="/consultation"
                class="font-serif text-sm tracking-wide uppercase font-medium text-emerald-400 border-b-2 border-emerald-400 pb-1"
                id="navConsultation">Consultation</a>
        </div>
        <div class="flex items-center gap-6">
            <button id="themeToggle" class="text-white/70 hover:text-emerald-400 transition-all"><span
                    class="material-symbols-outlined">light_mode</span></button>
            <button id="langToggle"
                class="text-white/70 hover:text-emerald-400 transition-all text-sm font-bold px-2 py-1 rounded-full border border-white/20">AR</button>
            <a href="/cart" class="relative">
                <span class="material-symbols-outlined text-white/70 hover:text-emerald-400 transition-all">shopping_bag</span>
                <span id="cartCount"
                    class="absolute -top-2 -right-2 bg-emerald-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
            </a>
            <a href="/profile" class="text-white/70 hover:text-emerald-400 transition-all"><span
                    class="material-symbols-outlined">person</span></a>
        </div>
    </nav>

    <div class="pt-32 pb-20">
        <div class="max-w-2xl mx-auto px-4 md:px-8">
            <div class="glass-panel rounded-xl p-6 md:p-8">
                <h1 class="font-headline-md text-headline-md text-center mb-2" id="pageTitle">Book a Consultation</h1>
                <p class="text-center text-on-surface-variant mb-8" id="pageDesc">Let our master florists help you
                    create the perfect floral experience for your event.</p>

                <form id="consultationForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-1" id="nameLabel">Full Name *</label>
                        <input type="text" id="fullName" class="w-full rounded-lg px-4 py-3 transition-all" placeholder="Your full name" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" id="emailLabel">Email Address *</label>
                        <input type="email" id="email" class="w-full rounded-lg px-4 py-3 transition-all" placeholder="you@example.com" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" id="phoneLabel">Phone Number</label>
                        <input type="tel" id="phone" class="w-full rounded-lg px-4 py-3 transition-all" placeholder="+1234567890">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" id="occasionLabel">Occasion Type</label>
                        <select id="occasionType" class="w-full rounded-lg px-4 py-3 transition-all">
                            <option value="">Select occasion</option>
                            <option value="wedding">Wedding</option>
                            <option value="anniversary">Anniversary</option>
                            <option value="birthday">Birthday</option>
                            <option value="corporate">Corporate Event</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" id="dateLabel">Preferred Date</label>
                        <input type="date" id="preferredDate" class="w-full rounded-lg px-4 py-3 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" id="messageLabel">Message / Special
                            Requests</label>
                        <textarea id="message" rows="3" class="w-full rounded-lg px-4 py-3 transition-all"
                            placeholder="Tell us about your vision..."></textarea>
                    </div>
                    <button type="submit"
                        class="w-full bg-primary text-white font-bold py-3 rounded-full hover:bg-opacity-90 transition-all"
                        id="submitBtn">SEND REQUEST</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-950 w-full border-t border-white/5 py-12 mt-10">
        <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <div class="text-lg font-serif italic text-white mb-2" id="footerBrand">Bloom Store</div>
                <p class="font-serif text-xs uppercase tracking-widest text-white/40" id="footerCopyright">© 2024 Bloom
                    Store. Botanical Elegance.</p>
            </div>
            <div class="flex flex-wrap justify-center gap-8"><a href="#"
                    class="font-serif text-xs uppercase tracking-widest text-white/40 hover:text-emerald-400 transition-colors"
                    id="footerPrivacy">Privacy Policy</a><a href="#"
                    class="font-serif text-xs uppercase tracking-widest text-white/40 hover:text-emerald-400 transition-colors"
                    id="footerTerms">Terms of Service</a><a href="#"
                    class="font-serif text-xs uppercase tracking-widest text-white/40 hover:text-emerald-400 transition-colors"
                    id="footerShipping">Shipping Info</a><a href="#"
                    class="font-serif text-xs uppercase tracking-widest text-white/40 hover:text-emerald-400 transition-colors"
                    id="footerContact">Contact</a></div>
        </div>
    </footer>

    <script>
        const htmlTag = document.documentElement;
        let currentLang = localStorage.getItem('bloomLang') || 'en';
        let currentTheme = localStorage.getItem('bloomTheme') || 'dark';

        const dict = {
            en: {
                brandName: 'Bloom Store', navHome: 'Home', navShop: 'Shop', navCategories: 'Categories', navOccasions: 'Occasions', navConsultation: 'Consultation',
                pageTitle: 'Book a Consultation', pageDesc: 'Let our master florists help you create the perfect floral experience for your event.',
                nameLabel: 'Full Name *', emailLabel: 'Email Address *', phoneLabel: 'Phone Number', occasionLabel: 'Occasion Type', dateLabel: 'Preferred Date', messageLabel: 'Message / Special Requests', submitBtn: 'SEND REQUEST',
                footerBrand: 'Bloom Store', footerCopyright: '© 2024 Bloom Store. Botanical Elegance.',
                footerPrivacy: 'Privacy Policy', footerTerms: 'Terms of Service', footerShipping: 'Shipping Info', footerContact: 'Contact',
                successTitle: 'Request Sent!', successMsg: 'Thank you for your consultation request. Our team will contact you within 24 hours.', errorTitle: 'Error', errorMsg: 'Please fill all required fields.'
            },
            ar: {
                brandName: 'شغف', navHome: 'الرئيسية', navShop: 'تسوق', navCategories: 'الفئات', navOccasions: 'المناسبات', navConsultation: 'استشارة',
                pageTitle: 'احجز استشارة', pageDesc: 'دع خبراء الزهور لدينا يساعدونك في إنشاء تجربة زهور مثالية لحدثك.',
                nameLabel: 'الاسم الكامل *', emailLabel: 'البريد الإلكتروني *', phoneLabel: 'رقم الهاتف', occasionLabel: 'نوع المناسبة', dateLabel: 'التاريخ المفضل', messageLabel: 'رسالة / طلبات خاصة', submitBtn: 'إرسال الطلب',
                footerBrand: 'شغف', footerCopyright: '© 2024 شغف. أناقة نباتية.',
                footerPrivacy: 'سياسة الخصوصية', footerTerms: 'شروط الخدمة', footerShipping: 'معلومات الشحن', footerContact: 'اتصل بنا',
                successTitle: 'تم الإرسال!', successMsg: 'شكراً لطلب الاستشارة. سيتواصل معك فريقنا خلال 24 ساعة.', errorTitle: 'خطأ', errorMsg: 'يرجى ملء جميع الحقول المطلوبة.'
            }
        };

        function applyLanguage(lang) {
            const t = dict[lang];
            htmlTag.setAttribute('lang', lang);
            htmlTag.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            for (let id in t) { const el = document.getElementById(id); if (el) el.innerText = t[id]; }
            document.getElementById('langToggle').innerText = (lang === 'en') ? 'AR' : 'EN';
        }
        
        function setTheme(theme) {
            if (theme === 'light') { 
                htmlTag.classList.remove('dark'); 
                htmlTag.classList.add('light'); 
                localStorage.setItem('bloomTheme', 'light'); 
                document.querySelector('#themeToggle span').innerText = 'dark_mode'; 
            } else { 
                htmlTag.classList.remove('light'); 
                htmlTag.classList.add('dark'); 
                localStorage.setItem('bloomTheme', 'dark'); 
                document.querySelector('#themeToggle span').innerText = 'light_mode'; 
            }
        }

        // Update cart count
        async function updateCartCount() {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            try {
                const res = await fetch('/api/cart/', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                const countEl = document.getElementById('cartCount');
                if (countEl && data.item_count > 0) {
                    countEl.innerText = data.item_count;
                    countEl.classList.remove('hidden');
                } else if (countEl) {
                    countEl.classList.add('hidden');
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('themeToggle').addEventListener('click', () => { 
            currentTheme = currentTheme === 'light' ? 'dark' : 'light'; 
            setTheme(currentTheme); 
        });
        
        document.getElementById('langToggle').addEventListener('click', () => { 
            currentLang = currentLang === 'en' ? 'ar' : 'en'; 
            localStorage.setItem('bloomLang', currentLang); 
            applyLanguage(currentLang); 
        });

        document.getElementById('consultationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const occasionType = document.getElementById('occasionType').value;
            const preferredDate = document.getElementById('preferredDate').value;
            const message = document.getElementById('message').value.trim();
            if (!fullName || !email) {
                Swal.fire({ icon: 'error', title: dict[currentLang].errorTitle, text: dict[currentLang].errorMsg });
                return;
            }
            try {
                const res = await fetch('/api/consultations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, occasionType, preferredDate, message })
                });
                const data = await res.json();
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: dict[currentLang].successTitle, text: dict[currentLang].successMsg });
                    document.getElementById('consultationForm').reset();
                } else {
                    Swal.fire({ icon: 'error', title: dict[currentLang].errorTitle, text: data.error || 'Something went wrong' });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: dict[currentLang].errorTitle, text: 'Network error. Please try again.' });
            }
        });

        setTheme(currentTheme);
        applyLanguage(currentLang);
        updateCartCount();
    </script>
</body>

</html>
