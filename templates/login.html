<!DOCTYPE html>
<html lang="en" id="html-tag" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Store | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,500;0,600;0,700;1,500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-body: #f8f9fa;
            --text-primary: #1a1c1c;
            --text-secondary: #404940;
            --surface-card: rgba(255, 255, 255, 0.8);
            --border-color: rgba(112, 121, 112, 0.2);
            --input-bg: #ffffff;
            --input-border: #c0ccc0;
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --error: #ba1a1a;
            --overlay: linear-gradient(to right, rgba(248, 249, 250, 0.1), rgba(248, 249, 250, 0.8));
            --social-btn-bg: rgba(0, 0, 0, 0.04);
        }

        html.dark {
            --bg-body: #111415;
            --text-primary: #e1e3e4;
            --text-secondary: #bbcbbb;
            --surface-card: rgba(29, 32, 33, 0.6);
            --border-color: rgba(134, 148, 134, 0.2);
            --input-bg: #191c1d;
            --input-border: #3d4a3e;
            --overlay: linear-gradient(to right, rgba(17, 20, 21, 0.4), rgba(17, 20, 21, 0.9));
            --social-btn-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            transition: background-color 0.3s;
        }

        .glass-card {
            background: var(--surface-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            border-radius: 1rem;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            transition: all 0.2s;
            border-radius: 0.5rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .social-btn {
            background-color: var(--social-btn-bg);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            border-radius: 0.5rem;
        }

        .social-btn:hover {
            transform: scale(0.97);
        }

        input {
            background-color: var(--input-bg);
            border-bottom: 1px solid var(--input-border);
            color: var(--text-primary);
            transition: all 0.2s;
            width: 100%;
            padding: 0.5rem 0.75rem 0.5rem 2.5rem;
            border-radius: 0.5rem 0.5rem 0 0;
        }

        input:focus {
            outline: none;
            border-bottom-color: var(--primary);
        }

        .error-message {
            font-size: 0.7rem;
            color: var(--error);
            margin-top: 4px;
            margin-left: 8px;
            display: none;
        }

        .flash-message {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            background-color: #f8d7da;
            color: #842029;
            display: none;
        }

        html.dark .flash-message {
            background-color: #842029;
            color: #f8d7da;
        }

        [dir="rtl"] .absolute.left-3 {
            left: auto;
            right: 0.75rem;
        }

        [dir="rtl"] .absolute.right-3 {
            right: auto;
            left: 0.75rem;
        }

        [dir="rtl"] .pl-10 {
            padding-left: 0;
            padding-right: 2.5rem;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <main class="flex-1 flex flex-col md:flex-row">
        <!-- Left Side -->
        <section class="relative w-full md:w-1/2 min-h-[300px] md:min-h-screen overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img alt="Botanical" class="w-full h-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXcgW6LWIhcDoFFyTSJ1K6lgWsxfe3XpWR-M5oOjiPcLZrOmp_OT2KRxLBh4tN4_j5xuIeX9ejuD22aBmByF9bpBDJBPYcfLfqA5NNJjhN1cdJ07Sha7QMXC8AcJiRKjH_pqZ3jb6iu6v4U-nZvnoiQ4eupCfeHTtl4Gl2llplvWqc8fF_3KNvmbtTJFXBX7grwdIxRH69e4-suczQ0G1Tg1-alCP8K7z7WLz3eNX-uCCqUVI-LjnYWA44fN5-j2yvVe-QmR3Xn40">
                <div class="absolute inset-0" style="background: var(--overlay);"></div>
            </div>
            <div class="relative z-10 h-full flex flex-col justify-center px-8 md:px-16">
                <h2 class="text-4xl md:text-5xl font-serif font-bold text-primary mb-2" id="brandName">Bloom Store</h2>
                <p class="text-2xl md:text-3xl font-serif italic max-w-md" id="leftSlogan">bloom with every visit</p>
                <div class="mt-6 w-12 h-1 bg-primary rounded-full"></div>
            </div>
        </section>

        <!-- Right Side: Sign In Form -->
        <section class="w-full md:w-1/2 flex items-center justify-center p-4 md:p-6">
            <div class="w-full max-w-md glass-card rounded-xl p-6 md:p-8 shadow-xl">
                <div class="flex justify-end gap-3 mb-4">
                    <button id="lightModeBtn"
                        class="text-sm px-2 py-1 rounded-full border border-gray-300 hover:text-primary transition">☀️</button>
                    <button id="darkModeBtn"
                        class="text-sm px-2 py-1 rounded-full border border-gray-300 hover:text-primary transition">🌙</button>
                    <button id="langToggleBtn"
                        class="text-sm px-3 py-1 rounded-full border border-gray-300 hover:text-primary transition font-mono">AR</button>
                </div>

                <header class="text-center mb-6">
                    <h1 class="text-3xl font-serif font-semibold mb-2" id="signinTitle">SIGN IN</h1>
                    <p class="text-base" id="signinSubtitle">Welcome back to the garden</p>
                </header>

                <div id="apiError" class="flash-message"></div>

                <!-- Social Buttons -->
                <div class="grid grid-cols-2 gap-3">
                    <button id="googleBtn"
                        class="social-btn flex items-center justify-center gap-2 p-3 rounded-lg transition-all">
                        <i class="fab fa-google text-2xl text-[#DB4437]"></i>
                        <span class="font-medium text-sm" id="googleText">Google</span>
                    </button>
                    <button id="fbBtn"
                        class="social-btn flex items-center justify-center gap-2 p-3 rounded-lg transition-all">
                        <i class="fab fa-facebook-f text-2xl text-[#1877F2]"></i>
                        <span class="font-medium text-sm" id="fbText">Facebook</span>
                    </button>
                </div>

                <div class="flex items-center gap-3 my-4">
                    <div class="h-px flex-1 bg-gray-400"></div>
                    <span class="text-xs tracking-wider text-gray-500" id="dividerText">OR USE EMAIL</span>
                    <div class="h-px flex-1 bg-gray-400"></div>
                </div>

                <form id="loginForm" class="space-y-4">
                    <div class="relative group">
                        <span
                            class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-500">mail</span>
                        <input type="email" id="email" name="email"
                            class="w-full pl-10 pr-3 py-2 border-b focus:border-primary rounded-t-lg"
                            placeholder="Email Address" required>
                        <div class="error-message" id="emailError"></div>
                    </div>
                    <div class="relative group">
                        <span
                            class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-500">lock</span>
                        <input type="password" id="password" name="password"
                            class="w-full pl-10 pr-10 py-2 border-b focus:border-primary rounded-t-lg"
                            placeholder="Password" required>
                        <button type="button"
                            class="toggle-pwd absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                        <div class="error-message" id="passError"></div>
                    </div>
                    <div class="text-right">
                        <a href="#" id="forgotLink" class="text-xs text-primary hover:underline">Forgot password?</a>
                    </div>
                    <button type="submit"
                        class="btn-primary w-full py-3 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95 text-sm font-bold tracking-wider">
                        <span id="loginBtnTxt">SIGN IN</span>
                        <span class="material-symbols-outlined">arrow_forward</span>
                    </button>
                </form>

                <p class="text-center text-sm mt-6" id="footerText">
                    New to the garden? <a href="/signup" class="text-primary font-bold underline underline-offset-4"
                        id="signupLink">Create account</a>
                </p>
            </div>
        </section>
    </main>

    <footer id="copyright" class="text-center text-sm py-4">
        © 2026 Bloom Store
    </footer>

    <script>
        // Theme & Language
        const htmlTag = document.documentElement;
        const lightBtn = document.getElementById('lightModeBtn');
        const darkBtn = document.getElementById('darkModeBtn');
        const langBtn = document.getElementById('langToggleBtn');

        let currentLang = localStorage.getItem('bloomLang') || 'en';
        let currentTheme = localStorage.getItem('bloomTheme') || 'light';

        const dict = {
            en: {
                brand: "Bloom Store", slogan: "bloom with every visit", title: "SIGN IN", subtitle: "Welcome back to the garden",
                divider: "OR USE EMAIL", emailPlace: "Email Address", passPlace: "Password", forgot: "Forgot password?",
                loginBtn: "SIGN IN", footer: "New to the garden? ", signupLink: "Create account", copyright: "© 2026 Bloom Store. Botanical Elegance.",
                google: "Google", facebook: "Facebook", errors: { emailReq: "Email required", emailValid: "Valid email required", passReq: "Password required" }
            },
            ar: {
                brand: "شغف", slogan: "تزهر مع كل زيارة", title: "تسجيل الدخول", subtitle: "مرحباً بعودتك إلى الحديقة",
                divider: "أو استخدم البريد الإلكتروني", emailPlace: "البريد الإلكتروني", passPlace: "كلمة المرور", forgot: "نسيت كلمة المرور؟",
                loginBtn: "تسجيل الدخول", footer: "جديد في الحديقة؟ ", signupLink: "إنشاء حساب", copyright: "© 2026 شغف. أناقة نباتية",
                google: "جوجل", facebook: "فيسبوك", errors: { emailReq: "البريد الإلكتروني مطلوب", emailValid: "بريد صالح مطلوب", passReq: "كلمة المرور مطلوبة" }
            }
        };

        function applyLanguage(lang) {
            const t = dict[lang];
            htmlTag.setAttribute('lang', lang);
            htmlTag.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('brandName').innerText = t.brand;
            document.getElementById('leftSlogan').innerText = t.slogan;
            document.getElementById('signinTitle').innerText = t.title;
            document.getElementById('signinSubtitle').innerText = t.subtitle;
            document.getElementById('dividerText').innerText = t.divider;
            document.getElementById('email').placeholder = t.emailPlace;
            document.getElementById('password').placeholder = t.passPlace;
            document.getElementById('forgotLink').innerText = t.forgot;
            document.getElementById('loginBtnTxt').innerText = t.loginBtn;
            document.getElementById('footerText').innerHTML = `${t.footer}<a href="/signup" class="text-primary font-bold underline underline-offset-4">${t.signupLink}</a>`;
            document.getElementById('copyright').innerText = t.copyright;
            document.getElementById('googleText').innerText = t.google;
            document.getElementById('fbText').innerText = t.facebook;
            langBtn.innerText = (lang === 'en') ? 'AR' : 'EN';
        }

        function setTheme(theme) {
            if (theme === 'dark') { htmlTag.classList.add('dark'); localStorage.setItem('bloomTheme', 'dark'); }
            else { htmlTag.classList.remove('dark'); localStorage.setItem('bloomTheme', 'light'); }
        }

        lightBtn.onclick = () => setTheme('light');
        darkBtn.onclick = () => setTheme('dark');
        langBtn.onclick = () => { currentLang = currentLang === 'en' ? 'ar' : 'en'; localStorage.setItem('bloomLang', currentLang); applyLanguage(currentLang); };

        // Password visibility
        document.querySelector('.toggle-pwd')?.addEventListener('click', function (e) {
            e.preventDefault();
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('span');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.innerText = input.type === 'password' ? 'visibility' : 'visibility_off';
        });

        setTheme(currentTheme);
        applyLanguage(currentLang);

        // ---------- API Connection ----------
        // ---------- API Connection ----------
        const API_BASE = "http://127.0.0.1:5000/api/auth";
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const emailErrorDiv = document.getElementById('emailError');
        const passErrorDiv = document.getElementById('passError');
        const apiErrorDiv = document.getElementById('apiError');

        function showFieldError(element, message) {
            element.innerText = message;
            element.style.display = 'block';
        }
        function hideFieldErrors() {
            emailErrorDiv.style.display = 'none';
            passErrorDiv.style.display = 'none';
            apiErrorDiv.style.display = 'none';
        }
        function validateForm() {
            let isValid = true;
            const err = dict[currentLang].errors;
            hideFieldErrors();
            const email = emailInput.value.trim();
            const password = passInput.value;
            if (!email) {
                showFieldError(emailErrorDiv, err.emailReq);
                isValid = false;
            } else if (!/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/i.test(email)) {
                showFieldError(emailErrorDiv, err.emailValid);
                isValid = false;
            }
            if (!password) {
                showFieldError(passErrorDiv, err.passReq);
                isValid = false;
            }
            return isValid;
        }

        async function handleLogin(e) {
            e.preventDefault();

            if (!validateForm()) return;

            const email = emailInput.value.trim();
            const password = passInput.value;

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {

                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    const tokenPayload = JSON.parse(
                        atob(data.access_token.split('.')[1])
                    );

                    const role = tokenPayload.role;

                    Swal.fire({
                        icon: 'success',
                        title: 'Logged in!',
                        text: 'Redirecting...',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {

                        if (role === 'admin' || role === 'Admin') {
                            window.location.href = '/admin/dashboard';
                        } else {
                            window.location.href = '/profile';
                        }

                    });

                } else {

                    Swal.fire({
                        icon: 'error',
                        title: 'Login failed',
                        text: data.error || 'Invalid email or password'
                    });

                }

            } catch (error) {

                console.error(error);

                Swal.fire({
                    icon: 'error',
                    title: 'Network error',
                    text: 'Please try again'
                });

            }
        }

        const loginForm = document.getElementById('loginForm');

        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
            console.log("Login event listener attached");
        } else {
            console.error("Login form not found!");
        }

        document.getElementById('googleBtn')?.addEventListener('click', () => {
            Swal.fire({
                icon: 'info',
                title: 'Coming soon',
                text: 'Social login will be available soon.'
            });
        });

        document.getElementById('fbBtn')?.addEventListener('click', () => {
            Swal.fire({
                icon: 'info',
                title: 'Coming soon',
                text: 'Social login will be available soon.'
            });
        });
    </script>
</body>

</html>
