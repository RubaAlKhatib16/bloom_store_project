<!DOCTYPE html>
<html class="dark" lang="en" id="html-tag" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation | Bloom Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* ========== GLOBAL STYLES (مطابقة لبقية الموقع) ========== */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            transition: transform 0.2s;
        }
        .glass-panel:hover {
            transform: translateY(-2px);
        }
        /* Dark mode (default) */
        html.dark body {
            background-color: #111415;
            color: #e1e3e4;
        }
        html.dark .glass-panel {
            background: rgba(17, 20, 21, 0.65);
            border: 1px solid rgba(134, 148, 134, 0.12);
        }
        html.dark .bg-black {
            background-color: #0c0f10 !important;
        }
        html.dark .text-zinc-600 {
            color: #869486 !important;
        }
        html.dark .text-zinc-500 {
            color: #6c757d !important;
        }
        html.dark .border-zinc-900 {
            border-color: #1a1e24 !important;
        }
        /* Light mode */
        html.light body {
            background-color: #f4f7f5;
            color: #1a1c1c;
        }
        html.light .glass-panel {
            background: rgba(255, 255, 255, 0.80);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        html.light .bg-black {
            background-color: #f0f4f2 !important;
        }
        html.light .text-zinc-600 {
            color: #4a5568 !important;
        }
        html.light .text-zinc-500 {
            color: #6c757d !important;
        }
        html.light .border-zinc-900 {
            border-color: #e2e8f0 !important;
        }
        /* Shared */
        [dir="rtl"] .text-left {
            text-align: right;
        }
        .text-primary {
            color: #2ecc71;
        }
        html.dark .text-primary {
            color: #54e98a;
        }
        .bg-primary {
            background-color: #2ecc71;
        }
        html.dark .bg-primary {
            background-color: #54e98a;
        }
        .border-primary\/50 {
            border-color: rgba(46, 204, 113, 0.5);
        }
        html.dark .border-primary\/50 {
            border-color: rgba(84, 233, 138, 0.5);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                fontFamily: { "body-md": ["Manrope"], "headline-md": ["Noto Serif"] }
            } }
        }
    </script>
</head>

<script>
    // دالة لتفعيل الرابط النشط في شريط التنقل
    function setActiveNavLink() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            // إزالة الكلاسات النشطة من جميع الروابط
            link.classList.remove('text-emerald-400', 'border-b-2', 'border-emerald-500', 'pb-1');
            link.classList.add('text-zinc-400');
            
            const linkPath = link.getAttribute('href');
            
            // التحقق من تطابق المسار (مع معالجة الحالة الخاصة للصفحة الرئيسية)
            if (linkPath === '/' && (currentPath === '/' || currentPath === '')) {
                link.classList.add('text-emerald-400', 'border-b-2', 'border-emerald-500', 'pb-1');
                link.classList.remove('text-zinc-400');
            } else if (linkPath !== '/' && currentPath.startsWith(linkPath)) {
                link.classList.add('text-emerald-400', 'border-b-2', 'border-emerald-500', 'pb-1');
                link.classList.remove('text-zinc-400');
            }
        });
    }
    
    // تنفيذ الدالة عند تحميل الصفحة وأيضاً عند تغيير المسار (للمشاريع التي تستخدم History API)
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
    window.addEventListener('popstate', setActiveNavLink);
</script>

    <main class="max-w-4xl mx-auto px-4 pt-32 pb-20">
        <div id="confirmationContainer" class="glass-panel rounded-xl p-6 md:p-8">
            <div class="text-center py-12 text-primary animate-pulse">Loading order details...</div>
        </div>
        <div class="text-center mt-8">
            <a href="/shop" class="inline-flex items-center gap-2 text-primary hover:underline">
                <span class="material-symbols-outlined">arrow_back</span>
                Continue Shopping
            </a>
        </div>
    </main>

    <footer class="w-full py-12 px-8 border-t border-zinc-900 bg-black flex flex-col items-center gap-6 mt-10">
        <div class="text-emerald-500 font-serif italic mb-2">Bloom Store</div>
        <div class="flex flex-wrap justify-center gap-8">
            <a href="#" class="font-serif text-sm text-zinc-600 hover:text-emerald-400 transition">Privacy Policy</a>
            <a href="#" class="font-serif text-sm text-zinc-600 hover:text-emerald-400 transition">Terms of Service</a>
            <a href="#" class="font-serif text-sm text-zinc-600 hover:text-emerald-400 transition">Shipping Info</a>
            <a href="#" class="font-serif text-sm text-zinc-600 hover:text-emerald-400 transition">Contact</a>
        </div>
        <p class="font-serif text-sm text-zinc-500">© 2026 Bloom Store. Botanical Elegance.</p>
    </footer>

    <script>
        // ========== GLOBALS ==========
        const htmlTag = document.documentElement;
        let currentLang = localStorage.getItem('bloomLang') || 'en';
        let currentTheme = localStorage.getItem('bloomTheme') || 'dark';
        const orderId = { order_id };

        // ========== Helper: fix image URL ==========
        function fixImageUrl(url) {
            if (!url) return 'https://placehold.co/80x80?text=Bloom';
            if (url.startsWith('http')) return url;
            if (url.startsWith('/static/')) return url;
            return '/static/' + url;
        }

        // ========== TRANSLATIONS ==========
        const dict = {
            en: {
                title: 'Order Confirmation',
                thankYou: 'Thank you for your purchase!',
                orderNumber: 'Order #',
                date: 'Date',
                status: 'Status',
                shippingAddress: 'Shipping Address',
                items: 'Order Items',
                product: 'Product',
                quantity: 'Qty',
                price: 'Price',
                subtotal: 'Subtotal',
                total: 'Total',
                backToShop: 'Continue Shopping',
                orderNotFound: 'Order not found. Please contact support.'
            },
            ar: {
                title: 'تأكيد الطلب',
                thankYou: 'شكراً لك على شرائك!',
                orderNumber: 'الطلب رقم',
                date: 'التاريخ',
                status: 'الحالة',
                shippingAddress: 'عنوان الشحن',
                items: 'عناصر الطلب',
                product: 'المنتج',
                quantity: 'الكمية',
                price: 'السعر',
                subtotal: 'المجموع الفرعي',
                total: 'المجموع الكلي',
                backToShop: 'متابعة التسوق',
                orderNotFound: 'الطلب غير موجود. يرجى الاتصال بالدعم.'
            }
        };

        function applyLanguage(lang) {
            const t = dict[lang];
            htmlTag.setAttribute('lang', lang);
            htmlTag.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('langToggle').innerText = (lang === 'en') ? 'AR' : 'EN';
            if (window.orderData) renderOrder(window.orderData);
        }

        function setTheme(theme) {
            if (theme === 'light') {
                htmlTag.classList.remove('dark');
                htmlTag.classList.add('light');
                localStorage.setItem('bloomTheme', 'light');
                document.querySelector('#themeToggle').innerText = 'light_mode';
            } else {
                htmlTag.classList.remove('light');
                htmlTag.classList.add('dark');
                localStorage.setItem('bloomTheme', 'dark');
                document.querySelector('#themeToggle').innerText = 'dark_mode';
            }
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(currentTheme);
        });
        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('bloomLang', currentLang);
            applyLanguage(currentLang);
        });

        async function loadOrder() {
            const container = document.getElementById('confirmationContainer');
            const token = localStorage.getItem('access_token');
            if (!token) {
                container.innerHTML = `<div class="text-center py-12 text-error">Please <a href="/login" class="text-primary underline">login</a> to view your order.</div>`;
                return;
            }
            try {
                const res = await fetch(`/api/orders/${orderId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Order not found');
                const order = await res.json();
                window.orderData = order;
                renderOrder(order);
            } catch (err) {
                container.innerHTML = `<div class="text-center py-12 text-error">${dict[currentLang].orderNotFound}</div>`;
            }
        }

        function renderOrder(order) {
            const t = dict[currentLang];
            const container = document.getElementById('confirmationContainer');
            const statusColor = 
                order.status === 'Delivered' ? 'text-green-400' :
                order.status === 'Shipped' ? 'text-blue-400' :
                order.status === 'Processing' ? 'text-yellow-400' : 'text-gray-400';
            htmlTag.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            container.innerHTML = `
                <div class="text-center mb-6">
                    <span class="material-symbols-outlined text-6xl text-primary">check_circle</span>
                    <h1 class="font-headline-md text-headline-md mt-2">${t.thankYou}</h1>
                    <p class="text-on-surface-variant">${t.orderNumber}${order.id}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="glass-panel p-4 rounded-xl">
                        <h3 class="font-headline-sm text-headline-sm mb-2">${t.date}</h3>
                        <p>${new Date(order.date).toLocaleDateString()}</p>
                        <h3 class="font-headline-sm text-headline-sm mt-4 mb-2">${t.status}</h3>
                        <p class="${statusColor} capitalize">${order.status}</p>
                    </div>
                    <div class="glass-panel p-4 rounded-xl">
                        <h3 class="font-headline-sm text-headline-sm mb-2">${t.shippingAddress}</h3>
                        <p>${order.shipping_address}</p>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl mb-6">
                    <h3 class="font-headline-sm text-headline-sm mb-4">${t.items}</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="border-b border-outline-variant">
                                <tr>
                                    <th class="text-left py-2">${t.product}</th>
                                    <th class="text-center py-2">${t.quantity}</th>
                                    <th class="text-right py-2">${t.price}</th>
                                    <th class="text-right py-2">${t.subtotal}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${order.items.map(item => `
                                    <tr class="border-b border-outline-variant">
                                        <td class="py-3 flex items-center gap-3">
                                            <img src="${fixImageUrl(item.image_url)}" class="w-12 h-12 object-cover rounded" alt="${escapeHtml(item.name)}">
                                            <span>${escapeHtml(item.name)}</span>
                                         </td>
                                        <td class="text-center py-3">${item.quantity}</td>
                                        <td class="text-right py-3">$${item.price.toFixed(2)}</td>
                                        <td class="text-right py-3">$${(item.price * item.quantity).toFixed(2)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div class="flex justify-end mt-4 pt-4 border-t border-outline-variant">
                        <div class="text-right">
                            <p class="text-lg font-bold">${t.total}: <span class="text-primary">$${order.total.toFixed(2)}</span></p>
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        setTheme(currentTheme);
        applyLanguage(currentLang);
        loadOrder();
    </script>

====================================================================
  BLOOM STORE — CHATBOT WIDGET

<!-- ===================== CHATBOT STYLES ===================== -->
<style>
  /* ── Chatbot root variables ── */
  :root {
    --cb-bg:        #0d1410;
    --cb-surface:   #141c17;
    --cb-surface2:  #1c2820;
    --cb-border:    rgba(84, 233, 138, 0.15);
    --cb-green:     #54e98a;
    --cb-green2:    #2ecc71;
    --cb-text:      #e1e3e4;
    --cb-muted:     #7a8f80;
    --cb-user-bg:   #1e3a2a;
    --cb-bot-bg:    #192218;
    --cb-radius:    18px;
    --cb-w:         370px;
    --cb-h:         520px;
    --cb-z:         9999;
  }

  /* ── Floating toggle button ── */
  #cb-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: var(--cb-z);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cb-green2), #1a7a45);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(46, 204, 113, 0.35), 0 0 0 0 rgba(46, 204, 113, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: cb-pulse 2.5s infinite;
  }
  #cb-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 40px rgba(46, 204, 113, 0.5), 0 0 0 0 rgba(46, 204, 113, 0.4);
  }
  #cb-toggle svg { width: 28px; height: 28px; fill: #fff; transition: transform 0.3s; }
  #cb-toggle.open svg { transform: rotate(45deg); }

  @keyframes cb-pulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(46,204,113,0.35), 0 0 0 0 rgba(46,204,113,0.4); }
    50%       { box-shadow: 0 8px 32px rgba(46,204,113,0.35), 0 0 0 10px rgba(46,204,113,0); }
  }

  /* Notification dot */
  #cb-notif {
    position: absolute;
    top: 4px; right: 4px;
    width: 14px; height: 14px;
    background: #ff4d6d;
    border-radius: 50%;
    border: 2px solid #0d1410;
    animation: cb-bounce 1s infinite alternate;
  }
  @keyframes cb-bounce { from { transform: scale(1); } to { transform: scale(1.3); } }

  /* ── Chat window ── */
  #cb-window {
    position: fixed;
    bottom: 100px;
    right: 28px;
    z-index: var(--cb-z);
    width: var(--cb-w);
    max-height: var(--cb-h);
    background: var(--cb-bg);
    border: 1px solid var(--cb-border);
    border-radius: var(--cb-radius);
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(84,233,138,0.08);
    transform: translateY(20px) scale(0.95);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    overflow: hidden;
  }
  #cb-window.open {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: all;
  }

  /* ── Header ── */
  #cb-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, #1a2e1f, #0f1d13);
    border-bottom: 1px solid var(--cb-border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cb-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cb-green2), #1a7a45);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(46,204,113,0.3);
  }
  .cb-header-info h3 {
    color: #fff; font-size: 15px; font-weight: 600;
    font-family: 'Noto Serif', serif;
    margin: 0 0 2px;
  }
  .cb-header-info p {
    color: var(--cb-green); font-size: 11px; margin: 0;
    display: flex; align-items: center; gap: 5px;
  }
  .cb-online-dot {
    width: 7px; height: 7px;
    background: var(--cb-green); border-radius: 50%;
    animation: cb-blink 1.5s infinite;
  }
  @keyframes cb-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #cb-close {
    margin-left: auto;
    background: none; border: none; cursor: pointer;
    color: var(--cb-muted); font-size: 20px; line-height: 1;
    padding: 4px 8px; border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  #cb-close:hover { color: #fff; background: rgba(255,255,255,0.08); }

  /* ── Messages area ── */
  #cb-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(84,233,138,0.2) transparent;
    min-height: 0;
    max-height: 340px;
  }
  #cb-messages::-webkit-scrollbar { width: 4px; }
  #cb-messages::-webkit-scrollbar-thumb { background: rgba(84,233,138,0.2); border-radius: 4px; }

  /* ── Message bubbles ── */
  .cb-msg {
    display: flex;
    gap: 8px;
    animation: cb-fadein 0.3s ease;
  }
  @keyframes cb-fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .cb-msg.user { flex-direction: row-reverse; }

  .cb-msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 14px;
    margin-top: 2px;
  }
  .cb-msg.bot .cb-msg-avatar {
    background: linear-gradient(135deg, #1a3a22, #0f2016);
    border: 1px solid var(--cb-border);
  }
  .cb-msg.user .cb-msg-avatar {
    background: rgba(46,204,113,0.15);
    border: 1px solid rgba(46,204,113,0.2);
  }

  .cb-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.55;
    font-family: 'Manrope', sans-serif;
  }
  .cb-msg.bot .cb-bubble {
    background: var(--cb-bot-bg);
    color: var(--cb-text);
    border: 1px solid var(--cb-border);
    border-bottom-left-radius: 4px;
  }
  .cb-msg.user .cb-bubble {
    background: var(--cb-user-bg);
    color: #c8f5d8;
    border: 1px solid rgba(84,233,138,0.18);
    border-bottom-right-radius: 4px;
  }

  /* Link button inside bot message */
  .cb-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    padding: 6px 12px;
    background: linear-gradient(135deg, rgba(46,204,113,0.2), rgba(46,204,113,0.08));
    border: 1px solid rgba(84,233,138,0.3);
    border-radius: 20px;
    color: var(--cb-green) !important;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-decoration: none !important;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
  }
  .cb-link-btn:hover {
    background: rgba(46,204,113,0.25);
    border-color: rgba(84,233,138,0.5);
  }
  .cb-link-btn svg { width: 12px; height: 12px; }

  /* Typing indicator */
  .cb-typing {
    display: flex; align-items: center; gap: 5px; padding: 10px 14px;
    background: var(--cb-bot-bg); border: 1px solid var(--cb-border);
    border-radius: 16px; border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .cb-typing span {
    width: 7px; height: 7px; background: var(--cb-green);
    border-radius: 50%; animation: cb-typing 1.2s infinite ease-in-out;
  }
  .cb-typing span:nth-child(2) { animation-delay: 0.2s; }
  .cb-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes cb-typing {
    0%,80%,100% { transform:scale(0.6); opacity:0.4; }
    40%          { transform:scale(1);   opacity:1; }
  }

  /* ── Quick replies ── */
  #cb-quick {
    padding: 8px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    border-top: 1px solid var(--cb-border);
    background: var(--cb-surface);
  }
  .cb-quick-btn {
    padding: 5px 12px;
    background: rgba(84,233,138,0.06);
    border: 1px solid rgba(84,233,138,0.18);
    border-radius: 20px;
    color: var(--cb-green);
    font-size: 11px;
    font-family: 'Manrope', sans-serif;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .cb-quick-btn:hover {
    background: rgba(84,233,138,0.15);
    border-color: rgba(84,233,138,0.4);
  }

  /* ── Input area ── */
  #cb-input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--cb-border);
    background: var(--cb-surface2);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #cb-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 9px 16px;
    color: var(--cb-text);
    font-size: 13px;
    font-family: 'Manrope', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #cb-input:focus { border-color: rgba(84,233,138,0.4); }
  #cb-input::placeholder { color: var(--cb-muted); }
  #cb-send {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cb-green2), #1a7a45);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(46,204,113,0.25);
  }
  #cb-send:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(46,204,113,0.4); }
  #cb-send svg { width: 17px; height: 17px; fill: #fff; }

  /* ── Mobile ── */
  @media (max-width: 420px) {
    :root { --cb-w: calc(100vw - 24px); }
    #cb-window { right: 12px; bottom: 90px; }
    #cb-toggle { right: 16px; bottom: 20px; }
  }

  /* Light mode overrides */
  html.light #cb-window {
    --cb-bg: #f8faf9;
    --cb-surface: #f0f4f2;
    --cb-surface2: #eaf0ec;
    --cb-border: rgba(46, 204, 113, 0.2);
    --cb-text: #1a1c1c;
    --cb-muted: #6b7c6f;
    --cb-bot-bg: #f0f5f2;
    --cb-user-bg: #e0f5e9;
    background: var(--cb-bg);
  }
  html.light #cb-header { background: linear-gradient(135deg, #e8f5ee, #ddf0e7); }
  html.light #cb-header .cb-header-info h3 { color: #1a1c1c; }
  html.light .cb-bubble { color: #1a1c1c; }
  html.light .cb-msg.bot .cb-bubble { background: #f0f5f2; border-color: rgba(46,204,113,0.18); }
  html.light .cb-msg.user .cb-bubble { background: #dcf0e5; color: #0d3320; }
  html.light #cb-input { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #1a1c1c; }
  html.light #cb-input::placeholder { color: #9aada0; }
</style>

<!-- ===================== CHATBOT HTML ===================== -->

<!-- Floating Toggle Button -->
<button id="cb-toggle" aria-label="Open chat assistant" title="Chat with Bloom">
  <span id="cb-notif"></span>
  <!-- Flower/Chat icon -->
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 3.0 1.01 4.29L2 22l5.71-1.01C9 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.38 0-2.68-.31-3.84-.86l-.27-.13-2.82.5.5-2.82-.13-.27C4.31 15.18 4 13.88 4 12.5 4 7.81 7.81 4 12.5 4S21 7.81 21 12.5 17.19 21 12.5 21H12zm5-8h-4V8h-2v5H7v2h4v4h2v-4h4v-2z"/>
  </svg>
</button>

<!-- Chat Window -->
<div id="cb-window" role="dialog" aria-label="Bloom floral assistant">

  <!-- Header -->
  <div id="cb-header">
    <div class="cb-avatar">🌸</div>
    <div class="cb-header-info">
      <h3>Bloom Assistant</h3>
      <p><span class="cb-online-dot"></span> Online · Here to help</p>
    </div>
    <button id="cb-close" aria-label="Close chat">✕</button>
  </div>

  <!-- Messages -->
  <div id="cb-messages"></div>

  <!-- Quick Replies -->
  <div id="cb-quick">
    <button class="cb-quick-btn" data-msg="birthday flowers">🎂 Birthday</button>
    <button class="cb-quick-btn" data-msg="wedding bouquet">💍 Wedding</button>
    <button class="cb-quick-btn" data-msg="graduation flowers">🎓 Graduation</button>
    <button class="cb-quick-btn" data-msg="valentine roses">❤️ Valentine</button>
    <button class="cb-quick-btn" data-msg="luxury flowers">💎 Luxury</button>
    <button class="cb-quick-btn" data-msg="delivery">🚚 Delivery</button>
  </div>

  <!-- Input -->
  <div id="cb-input-area">
    <input id="cb-input" type="text" placeholder="Ask about flowers, occasions..." maxlength="200" autocomplete="off">
    <button id="cb-send" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ===================== CHATBOT SCRIPT ===================== -->
<script>
(function () {
  'use strict';

  // ── DOM refs ──
  const toggle   = document.getElementById('cb-toggle');
  const window_  = document.getElementById('cb-window');
  const closeBtn = document.getElementById('cb-close');
  const messages = document.getElementById('cb-messages');
  const input    = document.getElementById('cb-input');
  const sendBtn  = document.getElementById('cb-send');
  const notif    = document.getElementById('cb-notif');
  const quickBtns = document.querySelectorAll('.cb-quick-btn');

  let isOpen = false;
  let isTyping = false;
  let welcomed = false;

  // ── Open / Close ──
  function openChat() {
    isOpen = true;
    window_.classList.add('open');
    toggle.classList.add('open');
    notif.style.display = 'none';
    input.focus();
    if (!welcomed) {
      welcomed = true;
      setTimeout(() => showBotMessage(
        "🌸 Welcome to <strong>Bloom Store</strong>! I'm your personal floral assistant.<br><br>Tell me about an occasion, emotion, or flower type — and I'll guide you to the perfect arrangement. What brings you here today?",
        "/shop",
        "Browse All Flowers"
      ), 400);
    }
  }

  function closeChat() {
    isOpen = false;
    window_.classList.remove('open');
    toggle.classList.remove('open');
  }

  toggle.addEventListener('click', () => isOpen ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (isOpen && !window_.contains(e.target) && e.target !== toggle) {
      closeChat();
    }
  });

  // ── Append user message ──
  function appendUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'cb-msg user';
    div.innerHTML = `
      <div class="cb-msg-avatar">👤</div>
      <div class="cb-bubble">${escapeHtml(text)}</div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  // ── Show bot message ──
  function showBotMessage(text, link, label) {
    removeTyping();
    const div = document.createElement('div');
    div.className = 'cb-msg bot';
    const linkHtml = link ? `
      <br>
      <a href="${link}" class="cb-link-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        ${escapeHtml(label || 'View')}
      </a>` : '';
    div.innerHTML = `
      <div class="cb-msg-avatar">🌸</div>
      <div class="cb-bubble">${text}${linkHtml}</div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  // ── Typing indicator ──
  function showTyping() {
    if (isTyping) return;
    isTyping = true;
    const div = document.createElement('div');
    div.className = 'cb-msg bot';
    div.id = 'cb-typing-msg';
    div.innerHTML = `
      <div class="cb-msg-avatar">🌸</div>
      <div class="cb-typing"><span></span><span></span><span></span></div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    isTyping = false;
    const el = document.getElementById('cb-typing-msg');
    if (el) el.remove();
  }

  // ── Scroll ──
  function scrollToBottom() {
    requestAnimationFrame(() => {
      messages.scrollTop = messages.scrollHeight;
    });
  }

  // ── Escape HTML ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  }

  // ── Send message ──
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isTyping) return;

    input.value = '';
    appendUserMessage(text);
    showTyping();

    try {
      const res = await fetch('/api/chatbot/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      // Small delay for natural feel
      setTimeout(() => {
        showBotMessage(data.reply, data.link, data.label);
      }, 600);

    } catch (err) {
      setTimeout(() => {
        showBotMessage(
          "🌿 Sorry, I'm having trouble connecting right now. Please try again in a moment or visit our shop directly.",
          "/shop",
          "Browse Shop"
        );
      }, 600);
    }
  }

  // ── Event listeners ──
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Quick reply buttons
  quickBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (!isOpen) openChat();
      input.value = btn.getAttribute('data-msg');
      setTimeout(sendMessage, 100);
    });
  });

  // Show notification dot after 3s if chat not opened
  setTimeout(() => {
    if (!isOpen) notif.style.display = 'block';
  }, 3000);

})();
</script>
</body>
