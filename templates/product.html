    <style>
        /* ========== BASE & GLASS ========== */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass {
            background: rgba(17, 20, 21, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 148, 134, 0.2);
            transition: all 0.3s ease;
        }
        .emerald-glow:hover {
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
        }
        /* ========== LIGHT MODE ========== */
        html.light body {
            background-color: #f4f7f5;
            color: #1a1c1c;
        }
        html.light .glass {
            background: rgba(255, 255, 255, 0.80);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        html.light .text-on-surface {
            color: #1a1c1c !important;
        }
        html.light .text-on-surface-variant {
            color: #4a5568 !important;
        }
        html.light .text-primary {
            color: #1a9e52 !important;
        }
        html.light .bg-neutral-950 {
            background-color: #f0f4f2 !important;
        }
        html.light .text-neutral-400, 
        html.light .text-neutral-500 {
            color: #4a5568 !important;
        }
        html.light .border-neutral-900 {
            border-color: #e2e8f0 !important;
        }
        html.light .border-outline-variant {
            border-color: #cbd5e0 !important;
        }
        html.light button.bg-primary {
            background-color: #2ecc71 !important;
        }
        html.light .bg-primary\/20 {
            background-color: rgba(46, 204, 113, 0.15) !important;
        }
        html.light .glass .text-white {
            color: #1a1c1c !important;
        }
        /* ========== DARK MODE ========== */
        html.dark body {
            background-color: #111415;
            color: #e1e3e4;
        }
        html.dark .glass {
            background: rgba(17, 20, 21, 0.65);
            border: 1px solid rgba(134, 148, 134, 0.12);
        }
        html.dark .text-on-surface {
            color: #e1e3e4 !important;
        }
        html.dark .text-on-surface-variant {
            color: #bbcbbb !important;
        }
        html.dark .text-primary {
            color: #54e98a !important;
        }
        html.dark .bg-neutral-950 {
            background-color: #0c0f10 !important;
        }
        html.dark .border-outline-variant {
            border-color: #2d3748 !important;
        }
        html.dark button.bg-primary {
            background-color: #54e98a !important;
        }
        html.dark .bg-primary\/20 {
            background-color: rgba(84, 233, 138, 0.12) !important;
        }
        /* ========== SHARED ========== */
        .quantity-btn {
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .quantity-btn:hover {
            color: #2ecc71;
        }
        .thumbnail {
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .thumbnail:hover {
            transform: scale(1.02);
        }
        .active-thumbnail {
            border: 2px solid #2ecc71;
            box-shadow: 0 0 15px rgba(46,204,113,0.3);
        }
        [dir="rtl"] .flex-row {
            flex-direction: row-reverse;
        }
    </style>

<script>
    // دالة لتفعيل الرابط النشط في شريط التنقل
    function setActiveNavLink() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            // إزالة الكلاسات النشطة من جميع الروابط
            link.classList.remove('text-emerald-400', 'border-b-2', 'border-emerald-500', 'pb-1');
            link.classList.add('text-zinc-400');
            
            const linkPath = link.getAttribute('href');
            
            // التحقق من تطابق المسار (مع معالجة الحالة الخاصة للصفحة الرئيسية)
            if (linkPath === '/' && (currentPath === '/' || currentPath === '')) {
                link.classList.add('text-emerald-400', 'border-b-2', 'border-emerald-500', 'pb-1');
                link.classList.remove('text-zinc-400');
            } else if (linkPath !== '/' && currentPath.startsWith(linkPath)) {
                link.classList.add('text-emerald-400', 'border-b-2', 'border-emerald-500', 'pb-1');
                link.classList.remove('text-zinc-400');
            }
        });
    }
    
    // تنفيذ الدالة عند تحميل الصفحة وأيضاً عند تغيير المسار (للمشاريع التي تستخدم History API)
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
    window.addEventListener('popstate', setActiveNavLink);
</script>

    <main class="flex-grow pt-32 pb-xl px-4 md:px-8">

    <footer class="w-full border-t border-neutral-900 bg-neutral-950 flex flex-col items-center py-12 px-6 gap-8 text-center mt-auto">

    <script>
        // ========== GLOBALS ==========
        const htmlTag = document.documentElement;
        let currentLang = localStorage.getItem('bloomLang') || 'en';
        let currentTheme = localStorage.getItem('bloomTheme') || 'dark';
        let productId = null;
        let productData = null;

        // ========== TRANSLATIONS ==========
        const dict = {
            en: {
                brandName: 'Bloom Store', navHome: 'Home', navShop: 'Shop', navCategories: 'Categories', navOccasions: 'Occasions', navContact: 'Contact',
                relatedTitle: 'Curated Companions', addToCart: 'ADD TO CART', inStock: 'In Stock', outOfStock: 'Out of Stock',
                category: 'Category', tags: 'Tags', shippingReturns: 'Shipping & Returns', shippingDesc: 'Express climate-controlled delivery within 24 hours. Returns accepted for quality issues within 2 hours of delivery.',
                share: 'SHARE ARTISTRY', loading: 'Loading product details...', error: 'Product not found', backToShop: 'Back to Shop',
                footerPrivacy: 'Privacy Policy', footerTerms: 'Terms of Service', footerShipping: 'Shipping Info', footerContact: 'Contact',
                copyright: '© 2026 Bloom Store. Cultivating Elegance.', addToCartSuccess: 'Added to Cart!', addToCartFail: 'Could not add to cart'
            },
            ar: {
                brandName: 'شغف', navHome: 'الرئيسية', navShop: 'تسوق', navCategories: 'الفئات', navOccasions: 'المناسبات', navContact: 'اتصل بنا',
                relatedTitle: 'قد يعجبك أيضاً', addToCart: 'أضف للسلة', inStock: 'متوفر', outOfStock: 'غير متوفر',
                category: 'الفئة', tags: 'العلامات', shippingReturns: 'الشحن والإرجاع', shippingDesc: 'توصيل سريع بدرجة حرارة مضبوطة خلال 24 ساعة. نقبل الإرجاع لمشاكل الجودة خلال ساعتين من التسليم.',
                share: 'شارك الجمال', loading: 'جاري تحميل المنتج...', error: 'المنتج غير موجود', backToShop: 'العودة إلى المتجر',
                footerPrivacy: 'سياسة الخصوصية', footerTerms: 'شروط الخدمة', footerShipping: 'معلومات الشحن', footerContact: 'اتصل بنا',
                copyright: '© 2026 شغف. نرتقي بالأناقة.', addToCartSuccess: 'تمت الإضافة!', addToCartFail: 'تعذرت الإضافة'
            }
        };

        function applyLanguage(lang) {
            const t = dict[lang];
            htmlTag.setAttribute('lang', lang);
            htmlTag.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            for (let id in t) { const el = document.getElementById(id); if (el) el.innerText = t[id]; }
            document.getElementById('langToggle').innerText = (lang === 'en') ? 'AR' : 'EN';
            if (productId) loadProduct();
        }

        function setTheme(theme) {
            if (theme === 'light') {
                htmlTag.classList.remove('dark');
                htmlTag.classList.add('light');
                localStorage.setItem('bloomTheme', 'light');
                document.querySelector('#themeToggle').innerText = 'dark_mode';
            } else {
                htmlTag.classList.remove('light');
                htmlTag.classList.add('dark');
                localStorage.setItem('bloomTheme', 'dark');
                document.querySelector('#themeToggle').innerText = 'light_mode';
            }
        }

        // ========== CART ==========
        async function updateCartCount() {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            try {
                const res = await fetch('/api/cart/', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                const countEl = document.getElementById('cartCount');
                if (countEl && data.item_count > 0) { countEl.innerText = data.item_count; countEl.classList.remove('hidden'); }
                else if (countEl) countEl.classList.add('hidden');
            } catch(e) {}
        }

        async function addToCart(flowerId, quantity = 1) {
            const token = localStorage.getItem('access_token');
            if (!token) {
                Swal.fire({ icon: 'warning', title: currentLang === 'en' ? 'Login Required' : 'مطلوب تسجيل الدخول', text: currentLang === 'en' ? 'Please login to add items to your cart' : 'يرجى تسجيل الدخول لإضافة المنتجات إلى السلة', confirmButtonColor: '#2ecc71' }).then(() => { window.location.href = '/login'; });
                return;
            }
            try {
                const res = await fetch('/api/cart/add', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flower_id: parseInt(flowerId), quantity: quantity })
                });
                const data = await res.json();
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: dict[currentLang].addToCartSuccess, timer: 1500, showConfirmButton: false });
                    updateCartCount();
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: data.error || dict[currentLang].addToCartFail });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Network Error', text: 'Please try again later.' });
            }
        }

        // ========== PRODUCT LOADING ==========
        async function loadProduct() {
            const container = document.getElementById('productContainer');
            const t = dict[currentLang];
            container.innerHTML = `<div class="lg:col-span-12 text-center py-12 text-primary animate-pulse">${t.loading}</div>`;
            try {
                const res = await fetch(`/api/flowers/${productId}`);
                if (!res.ok) throw new Error();
                const product = await res.json();
                productData = product;
                renderProduct(product);
                loadRelatedProducts(product.category, product.id);
                updateCartCount();
            } catch (err) {
                container.innerHTML = `<div class="lg:col-span-12 text-center py-12 text-error">${t.error}<br><a href="/shop" class="text-primary mt-4 inline-block underline">${t.backToShop}</a></div>`;
            }
        }

        function fixImageUrl(url) {
            if (!url) return 'https://placehold.co/600x600?text=Bloom';
            if (url.startsWith('http')) return url;
            if (url.startsWith('/static/')) return url;
            return '/static/' + url;
        }

        function renderProduct(product) {
            const t = dict[currentLang];
            const container = document.getElementById('productContainer');
            const images = product.images || [];
            const mainImage = images.find(img => img.is_primary) || images[0] || { url: fixImageUrl(product.image_url) };
            const thumbnails = images.filter(img => img.url !== mainImage.url);
            const stockHtml = (product.stock > 0 || product.stock === undefined) 
                ? `<span class="text-primary font-label-caps text-label-caps border border-primary/30 px-2 py-1 rounded">${t.inStock}</span>` 
                : `<span class="text-red-500 font-label-caps text-label-caps border border-red-500/30 px-2 py-1 rounded">${t.outOfStock}</span>`;
            const tags = product.tags ? product.tags.split(',').map(tag => tag.trim()) : ['Luxury', 'Rare'];
            
            container.innerHTML = `
                <div class="lg:col-span-7 space-y-4">
                    <div class="glass rounded-xl overflow-hidden aspect-[4/5] relative">
                        <img id="mainProductImage" class="w-full h-full object-cover" src="${fixImageUrl(mainImage.url)}" alt="${escapeHtml(product.name)}">
                        ${product.is_best_seller ? `<div class="absolute top-4 left-4"><span class="bg-primary/20 border border-primary text-primary px-2 py-1 rounded-full font-label-caps text-label-caps backdrop-blur-md">Rare Species</span></div>` : ''}
                    </div>
                    <div id="thumbnailContainer" class="grid grid-cols-4 gap-3">
                        ${thumbnails.map((img, idx) => `
                            <div class="thumbnail glass rounded-lg overflow-hidden aspect-square ${idx === 0 ? 'active-thumbnail' : ''} cursor-pointer" data-image="${fixImageUrl(img.url)}">
                                <img class="w-full h-full object-cover" src="${fixImageUrl(img.url)}" alt="Thumbnail">
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="lg:col-span-5 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h1 class="font-display-lg text-display-lg text-on-surface">${escapeHtml(product.name)}</h1>
                            <div class="flex items-center text-primary gap-0.5">
                                ${Array(5).fill().map(() => `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>`).join('')}
                            </div>
                        </div>
                        <div class="flex items-baseline gap-4 mb-6">
                            <span class="font-headline-md text-headline-md text-primary">$${parseFloat(product.price).toFixed(2)}</span>
                            <span>${stockHtml}</span>
                        </div>
                        <p class="font-body-lg text-body-lg text-on-surface-variant mb-8 leading-relaxed italic">${escapeHtml(product.description || 'No description available.')}</p>
                        
                        <div class="space-y-6 mb-8">
                            <div class="flex items-center gap-4">
                                <div class="glass rounded-full flex items-center p-1 border-outline-variant">
                                    <button id="decrQty" class="quantity-btn w-10 h-10 flex items-center justify-center rounded-full hover:text-primary transition-colors active:scale-90">
                                        <span class="material-symbols-outlined">remove</span>
                                    </button>
                                    <span id="qtyValue" class="w-12 text-center font-bold">1</span>
                                    <button id="incrQty" class="quantity-btn w-10 h-10 flex items-center justify-center rounded-full hover:text-primary transition-colors active:scale-90">
                                        <span class="material-symbols-outlined">add</span>
                                    </button>
                                </div>
                                <button id="addToCartBtn" class="flex-grow bg-primary text-white font-label-caps text-label-caps py-3 rounded-full emerald-glow transition-all active:scale-[0.98]">
                                    ${t.addToCart}
                                </button>
                            </div>
                        </div>
                        
                        <div class="glass rounded-xl p-4 space-y-3">
                            <div class="flex justify-between border-b border-outline-variant pb-2">
                                <span class="text-on-surface-variant font-label-caps text-label-caps">${t.category}</span>
                                <span class="text-on-surface">${escapeHtml(product.category || 'Uncategorized')}</span>
                            </div>
                            <div class="flex justify-between border-b border-outline-variant pb-2">
                                <span class="text-on-surface-variant font-label-caps text-label-caps">${t.tags}</span>
                                <span class="text-on-surface">${tags.join(', ')}</span>
                            </div>
                            <div class="pt-2">
                                <div class="flex items-center gap-1 text-primary mb-2">
                                    <span class="material-symbols-outlined text-sm">local_shipping</span>
                                    <span class="font-label-caps text-label-caps">${t.shippingReturns}</span>
                                </div>
                                <p class="text-on-surface-variant text-sm">${t.shippingDesc}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 pt-6 mt-4">
                        <span class="text-on-tertiary-container font-label-caps text-label-caps">${t.share}</span>
                        <div class="flex gap-2">
                            <a class="w-10 h-10 glass rounded-full flex items-center justify-center text-on-surface hover:text-primary transition-colors" href="javascript:void(0)" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(location.href),'_blank')">
                                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                            </a>
                            <a class="w-10 h-10 glass rounded-full flex items-center justify-center text-on-surface hover:text-primary transition-colors" href="javascript:void(0)" onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(product.name)}&url='+encodeURIComponent(location.href),'_blank')">
                                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                            </a>
                            <a class="w-10 h-10 glass rounded-full flex items-center justify-center text-on-surface hover:text-primary transition-colors" href="javascript:void(0)" onclick="window.open('https://wa.me/?text=${encodeURIComponent(product.name)}%20${encodeURIComponent(location.href)}','_blank')">

            `;

            // Thumbnail click handler
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.addEventListener('click', () => {
                    const newSrc = thumb.getAttribute('data-image');
                    document.getElementById('mainProductImage').src = newSrc;
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active-thumbnail'));
                    thumb.classList.add('active-thumbnail');
                });
            });
            
            // Quantity buttons
            let quantity = 1;
            const qtySpan = document.getElementById('qtyValue');
            document.getElementById('decrQty').addEventListener('click', () => {
                if (quantity > 1) { quantity--; qtySpan.innerText = quantity; }
            });
            document.getElementById('incrQty').addEventListener('click', () => {
                if (product.stock > quantity) { quantity++; qtySpan.innerText = quantity; }
            });
            document.getElementById('addToCartBtn').addEventListener('click', () => {
                addToCart(product.id, quantity);
            });
        }

        async function loadRelatedProducts(category, excludeId) {
            const section = document.getElementById('relatedSection');
            const grid = document.getElementById('relatedGrid');
            if (!category) { section.classList.add('hidden'); return; }
            try {
                const res = await fetch(`/api/flowers?category=${encodeURIComponent(category)}&limit=4`);
                const products = await res.json();
                const filtered = products.filter(p => p.id != excludeId).slice(0, 4);
                if (filtered.length === 0) { section.classList.add('hidden'); return; }
                section.classList.remove('hidden');
                grid.innerHTML = filtered.map(p => `
                    <div class="glass group p-2 rounded-xl transition-all hover:-translate-y-2">
                        <a href="/product/${p.id}" class="block">
                            <div class="aspect-[3/4] rounded-lg overflow-hidden mb-2 relative">
                                <img class="w-full h-full object-cover transition-all duration-500" src="${fixImageUrl(p.image_url)}" alt="${escapeHtml(p.name)}">
                                <div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-60"></div>
                            </div>
                            <div class="px-2 pb-2">
                                <h3 class="font-headline-sm text-headline-sm text-on-surface mb-1">${escapeHtml(p.name)}</h3>
                                <div class="flex justify-between items-center">
                                    <span class="text-primary font-bold">$${parseFloat(p.price).toFixed(2)}</span>
                                    <span class="material-symbols-outlined text-primary-container text-sm">add_circle</span>
                                </div>
                            </div>
                        </a>
                    </div>
                `).join('');
            } catch (err) { section.classList.add('hidden'); }
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        // ========== INIT ==========
        const pathParts = window.location.pathname.split('/');
        productId = pathParts[pathParts.length - 1];
        if (isNaN(productId)) productId = null;
        
        document.getElementById('themeToggle').addEventListener('click', () => { 
            currentTheme = currentTheme === 'light' ? 'dark' : 'light'; 
            setTheme(currentTheme); 
            if (productId) loadProduct(); 
        });
        document.getElementById('langToggle').addEventListener('click', () => { 
            currentLang = currentLang === 'en' ? 'ar' : 'en'; 
            localStorage.setItem('bloomLang', currentLang); 
            applyLanguage(currentLang); 
        });
        
        setTheme(currentTheme);
        applyLanguage(currentLang);
        if (productId) loadProduct();
        else document.getElementById('productContainer').innerHTML = '<div class="lg:col-span-12 text-center py-12 text-error">Invalid product ID.</div>';
    </script>

<!-- ===================== CHATBOT SCRIPT ===================== -->
<script>
(function () {
  'use strict';

  // ── DOM refs ──
  const toggle   = document.getElementById('cb-toggle');
  const window_  = document.getElementById('cb-window');
  const closeBtn = document.getElementById('cb-close');
  const messages = document.getElementById('cb-messages');
  const input    = document.getElementById('cb-input');
  const sendBtn  = document.getElementById('cb-send');
  const notif    = document.getElementById('cb-notif');
  const quickBtns = document.querySelectorAll('.cb-quick-btn');

  let isOpen = false;
  let isTyping = false;
  let welcomed = false;

  // ── Open / Close ──
  function openChat() {
    isOpen = true;
    window_.classList.add('open');
    toggle.classList.add('open');
    notif.style.display = 'none';
    input.focus();
    if (!welcomed) {
      welcomed = true;
      setTimeout(() => showBotMessage(
        "🌸 Welcome to <strong>Bloom Store</strong>! I'm your personal floral assistant.<br><br>Tell me about an occasion, emotion, or flower type — and I'll guide you to the perfect arrangement. What brings you here today?",
        "/shop",
        "Browse All Flowers"
      ), 400);
    }
  }

  function closeChat() {
    isOpen = false;
    window_.classList.remove('open');
    toggle.classList.remove('open');
  }

  toggle.addEventListener('click', () => isOpen ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (isOpen && !window_.contains(e.target) && e.target !== toggle) {
      closeChat();
    }
  });

  // ── Append user message ──
  function appendUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'cb-msg user';
    div.innerHTML = `
      <div class="cb-msg-avatar">👤</div>
      <div class="cb-bubble">${escapeHtml(text)}</div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  // ── Show bot message ──
  function showBotMessage(text, link, label) {
    removeTyping();
    const div = document.createElement('div');
    div.className = 'cb-msg bot';
    const linkHtml = link ? `
      <br>
      <a href="${link}" class="cb-link-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        ${escapeHtml(label || 'View')}
      </a>` : '';
    div.innerHTML = `
      <div class="cb-msg-avatar">🌸</div>
      <div class="cb-bubble">${text}${linkHtml}</div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  // ── Typing indicator ──
  function showTyping() {
    if (isTyping) return;
    isTyping = true;
    const div = document.createElement('div');
    div.className = 'cb-msg bot';
    div.id = 'cb-typing-msg';
    div.innerHTML = `
      <div class="cb-msg-avatar">🌸</div>
      <div class="cb-typing"><span></span><span></span><span></span></div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    isTyping = false;
    const el = document.getElementById('cb-typing-msg');
    if (el) el.remove();
  }

  // ── Scroll ──
  function scrollToBottom() {
    requestAnimationFrame(() => {
      messages.scrollTop = messages.scrollHeight;
    });
  }

  // ── Escape HTML ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  }

  // ── Send message ──
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isTyping) return;

    input.value = '';
    appendUserMessage(text);
    showTyping();

    try {
      const res = await fetch('/api/chatbot/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      // Small delay for natural feel
      setTimeout(() => {
        showBotMessage(data.reply, data.link, data.label);
      }, 600);

    } catch (err) {
      setTimeout(() => {
        showBotMessage(
          "🌿 Sorry, I'm having trouble connecting right now. Please try again in a moment or visit our shop directly.",
          "/shop",
          "Browse Shop"
        );
      }, 600);
    }
  }

  // ── Event listeners ──
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Quick reply buttons
  quickBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (!isOpen) openChat();
      input.value = btn.getAttribute('data-msg');
      setTimeout(sendMessage, 100);
    });
  });

  // Show notification dot after 3s if chat not opened
  setTimeout(() => {
    if (!isOpen) notif.style.display = 'block';
  }, 3000);

})();
</script>
</body>
</html>
